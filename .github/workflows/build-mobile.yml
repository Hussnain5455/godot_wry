name: 📱 Mobile Builds

on:
  push:
    branches: main
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: main

jobs:
  android-rust:
    permissions:
      contents: write

    name: 🤖 Android Rust Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up NDK
        uses: android-actions/setup-android@v3

      - name: Install Just
        uses: extractions/setup-just@v1

      - name: Build Android binary
        run: |
          just build-android > rust_build_log.txt 2>&1 || (git config --global user.name "GitHub Action"; git config --global user.email "action@github.com"; git add rust_build_log.txt; git commit -m "Add failing rust build log"; git pull --rebase; git push; exit 1)


      - name: Upload Rust log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-build-log
          path: rust_build_log.txt

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: libgodot_wry-android
          path: godot/addons/godot_wry/bin/aarch64-linux-android

  android-plugin:
    name: 🤖 Android Plugin AAR Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0.2'

      - name: Build AAR Plugin
        run: |
          cd android-plugin
          gradle assembleRelease --info > gradle_build_log_${{ github.run_id }}.txt 2>&1 || (cat gradle_build_log_${{ github.run_id }}.txt; git config --global user.name "GitHub Action"; git config --global user.email "action@github.com"; git add gradle_build_log_${{ github.run_id }}.txt; git commit -m "Add failing gradle build log for run ${{ github.run_id }}"; git pull --rebase origin main; git push origin HEAD:main || true; exit 1)

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: android-plugin/build/reports


      - name: Copy AAR to Addon
        run: |
          mkdir -p godot/addons/godot_wry/bin/android
          cp android-plugin/build/outputs/aar/android-plugin-release.aar godot/addons/godot_wry/bin/android/godot_wry_plugin.aar

      - name: Upload AAR Plugin
        uses: actions/upload-artifact@v4
        with:
          name: godot_wry_plugin-aar
          path: godot/addons/godot_wry/bin/android




